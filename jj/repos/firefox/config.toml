#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

# NOTE: This configuration was generated from Erich's scripting at
# <https://github.com/erichdongubler-mozilla/fx-scripts>. If you need to edit it,
# consider sharing upstream!

fsmonitor.backend = "watchman"
# fsmonitor.watchman.register-snapshot-trigger = true

[aliases]
"trains" = ["log", "--revisions=show_fork_point(trains() | @)"]

[colors]
"erichdongubler_moz_patch description" = "bright black"

[fix.tools.clang-format]
command = [
  "~/.mozbuild/clang-tools/clang-tidy/bin/clang-format",
  "--assume-filename=$path",
]
patterns = ["glob:'**/*.c'", "glob:'**/*.h'", "glob:'**/*.cpp'"]

[git]
fetch = ["origin", "upstream"]

[remotes.origin]
auto-track-bookmarks = "*"

[revset-aliases]
"trunk()" = "main@upstream"

# NOTE: Typical `builtin_immutable_heads()` is `trunk() | tags() | untracked_remote_branches()`, but
# I want to exclude tags of the form `pin/*`. It's weird, I know, but it's what I want!
"immutable_heads()" = '''
trunk() | tags(regex:"^[^p][^i][^n][^/]") | untracked_remote_bookmarks()
| remote_bookmarks(exact:'autoland')
| trains()
'''

"trains()" = '''
trunk()
| remote_bookmarks(exact:'beta')
| remote_bookmarks(regex:'^esr\d+$')
| remote_bookmarks(exact:'release')
'''

[template-aliases]

"moz_description_first_line" = "moz_description_first_line(self)"
"moz_description_first_line(commit)" = '''
replace(
  regex:'\bBug (\d+)\b',
  commit.description().first_line(),
  |c| hyperlink(
    "https://bugzilla.mozilla.org/show_bug.cgi?id=" ++ c.get(1),
    c.get(0),
  ),
)
'''

"moz_phabricator_patches" = "moz_phabricator_patches(self)"
"moz_phabricator_patches(commit)" = '''
commit
  .description()
  .split(regex:'\n')
  .filter(|l|
    l.match(regex:'^Differential Revision: https://phabricator\.services\.mozilla.com/D\d+$'),
  )
  .map(|l|
    replace(
      regex:'^Differential Revision: (https://phabricator\.services\.mozilla\.com/(D\d+))$',
      l,
      |c| hyperlink(c.get(1), c.get(2)),
    )
  )
  .join(' ')
'''

"erichdongubler_log_compact_description_line(commit)" = 'moz_description_first_line(commit)'
"erichdongubler_log_compact_extra_refs(commit)" = 'label("erichdongubler_moz_patch", moz_phabricator_patches(commit))'
